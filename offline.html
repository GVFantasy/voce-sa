<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voce S.A. offline</title>
<meta name="theme-color" content="#534AB7">
<style>
  :root {
    color-scheme: light;
    --bg: #FAFAF8;
    --card: #FFFFFF;
    --text: #171717;
    --muted: #6F6F76;
    --brand: #534AB7;
    --border: #E7E4DF;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  main {
    width: min(100%, 420px);
    padding: 28px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
  }

  .mark {
    width: 48px;
    height: 48px;
    display: grid;
    place-items: center;
    border-radius: 8px;
    margin-bottom: 18px;
    background: var(--brand);
    color: #fff;
    font-weight: 800;
  }

  h1 {
    margin: 0 0 8px;
    font-size: 24px;
    line-height: 1.15;
  }

  p {
    margin: 0 0 18px;
    color: var(--muted);
    font-size: 15px;
    line-height: 1.55;
  }

  button {
    width: 100%;
    min-height: 44px;
    border: 0;
    border-radius: 8px;
    background: var(--brand);
    color: #fff;
    font: inherit;
    font-weight: 700;
    cursor: pointer;
  }
</style>
</head>
<body>
<main>
  <div class="mark">SA</div>
  <h1>Voce esta offline</h1>
  <p>O app continua instalado, mas precisa de internet para sincronizar login, check-ins e dados do Supabase.</p>
  <button type="button" onclick="window.location.reload()">Tentar novamente</button>
</main>
</body>
</html>
