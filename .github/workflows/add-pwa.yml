name: Add PWA files

on:
  push:
    branches:
      - refactor/app-structure

permissions:
  contents: write

jobs:
  add-pwa:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/app-structure
      - name: Create PWA assets
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import json
          import struct
          import zlib

          index_path = Path('index.html')
          html = index_path.read_text(encoding='utf-8')

          css_link = '<link rel="stylesheet" href="css/styles.css">'
          pwa_head = '\n'.join([
              '<link rel="manifest" href="manifest.json">',
              '<meta name="theme-color" content="#534AB7">',
              '<meta name="apple-mobile-web-app-capable" content="yes">',
              '<meta name="apple-mobile-web-app-title" content="Voc&ecirc; S.A.">',
              '<meta name="apple-mobile-web-app-status-bar-style" content="default">',
              '<link rel="apple-touch-icon" href="icons/icon-192.png">',
              css_link,
          ])
          if 'manifest.json' not in html:
              html = html.replace(css_link, pwa_head)

          app_script = '<script src="js/app.js"></script>\n</body>'
          sw_registration = '\n'.join([
              '<script src="js/app.js"></script>',
              '<script>',
              'if ("serviceWorker" in navigator) {',
              '  window.addEventListener("load", () => {',
              '    navigator.serviceWorker.register("service-worker.js").catch(() => {});',
              '  });',
              '}',
              '</script>',
              '</body>',
          ])
          if 'service-worker.js' not in html:
              html = html.replace(app_script, sw_registration)
          index_path.write_text(html, encoding='utf-8')

          manifest = {
              'name': 'Voc\u00ea S.A.',
              'short_name': 'Voc\u00ea S.A.',
              'description': 'Seu sistema de desenvolvimento pessoal.',
              'start_url': './index.html',
              'scope': './',
              'display': 'standalone',
              'orientation': 'portrait',
              'background_color': '#FAFAF8',
              'theme_color': '#534AB7',
              'icons': [
                  {'src': 'icons/icon-192.png', 'sizes': '192x192', 'type': 'image/png', 'purpose': 'any maskable'},
                  {'src': 'icons/icon-512.png', 'sizes': '512x512', 'type': 'image/png', 'purpose': 'any maskable'},
              ],
          }
          Path('manifest.json').write_text(json.dumps(manifest, indent=2) + '\n', encoding='utf-8')

          service_worker = '''const CACHE_NAME = "voce-sa-v1";
          const APP_SHELL = [
            "./",
            "./index.html",
            "./css/styles.css",
            "./js/app.js",
            "./manifest.json",
            "./icons/icon-192.png",
            "./icons/icon-512.png"
          ];

          self.addEventListener("install", event => {
            event.waitUntil(
              caches.open(CACHE_NAME).then(cache => cache.addAll(APP_SHELL))
            );
            self.skipWaiting();
          });

          self.addEventListener("activate", event => {
            event.waitUntil(
              caches.keys().then(keys => Promise.all(
                keys.filter(key => key !== CACHE_NAME).map(key => caches.delete(key))
              ))
            );
            self.clients.claim();
          });

          self.addEventListener("fetch", event => {
            if (event.request.method !== "GET") return;

            event.respondWith(
              caches.match(event.request).then(cached => {
                if (cached) return cached;

                return fetch(event.request).then(response => {
                  const copy = response.clone();
                  caches.open(CACHE_NAME).then(cache => cache.put(event.request, copy));
                  return response;
                }).catch(() => {
                  if (event.request.mode === "navigate") {
                    return caches.match("./index.html");
                  }
                });
              })
            );
          });
          '''
          Path('service-worker.js').write_text('\n'.join(line[10:] if line.startswith('          ') else line for line in service_worker.splitlines()) + '\n', encoding='utf-8')

          def png_chunk(kind, data):
              chunk = kind + data
              return struct.pack('>I', len(data)) + chunk + struct.pack('>I', zlib.crc32(chunk) & 0xffffffff)

          def make_icon(size, path):
              purple = (83, 74, 183, 255)
              light = (250, 250, 248, 255)
              green = (29, 158, 117, 255)
              rows = []
              center = (size - 1) / 2
              outer = size * 0.33
              inner = size * 0.20
              for y in range(size):
                  raw = bytearray([0])
                  for x in range(size):
                      dx = x - center
                      dy = y - center
                      d2 = dx * dx + dy * dy
                      if d2 <= inner * inner:
                          color = green
                      elif d2 <= outer * outer:
                          color = light
                      else:
                          color = purple
                      raw.extend(color)
                  rows.append(bytes(raw))
              data = b''.join(rows)
              png = b'\x89PNG\r\n\x1a\n'
              png += png_chunk(b'IHDR', struct.pack('>IIBBBBB', size, size, 8, 6, 0, 0, 0))
              png += png_chunk(b'IDAT', zlib.compress(data, 9))
              png += png_chunk(b'IEND', b'')
              Path(path).write_bytes(png)

          Path('icons').mkdir(exist_ok=True)
          make_icon(192, 'icons/icon-192.png')
          make_icon(512, 'icons/icon-512.png')
          Path('.github/workflows/add-pwa.yml').unlink()
          PY
      - name: Commit PWA files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html manifest.json service-worker.js icons/icon-192.png icons/icon-512.png .github/workflows/add-pwa.yml
          git commit -m "feat: add basic PWA support"
          git push origin refactor/app-structure
